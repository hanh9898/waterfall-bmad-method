# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-create-ux.
# Team overrides:     {project-root}/_bmad/custom/hbc-create-ux.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-create-ux.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# D-14 template path. Override to use a custom template.
template_path = "assets/D-14_ux-screen-design_template.md"

# D-14 UX / Screen Design is PER-FEATURE (Phase 2).
output_dir = "{output_folder}/features/{feature}/planning-artifacts"

# Validation script. Override to use a custom validator with the same CLI interface.
validation_script = "scripts/validate-ux.py"

# Advisory UX consistency check (UX-2/3/4/6/7): REQ→screen→component→test coverage,
# component↔token, design-sync (mockup) presence, component-map↔code reconcile.
# ADVISORY — never blocks (the blocking inter-doc gate is [IR]/[PG]).
consistency_script = "scripts/check-ux-consistency.py"

# Shell command to run after D-14 is saved. Empty = no hook.
on_complete = ""

# hbc-traceability impact integration (BR-13). Default false.
auto_sync_after_update = false
