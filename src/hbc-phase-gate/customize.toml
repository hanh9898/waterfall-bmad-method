# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-phase-gate.
# Team overrides:     {project-root}/_bmad/custom/hbc-phase-gate.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-phase-gate.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

activation_steps_prepend = []

activation_steps_append = []

# Foundational context loaded on activation. Append project-specific artifacts
# (e.g. "file:{project-root}/_hbc_output/traceability/matrix.md") in your team override.
persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Gate checklist per phase. Default checklists ship with this skill.
# To override: set the same key in {project-root}/_bmad/custom/hbc-phase-gate.toml
# with an absolute or {project-root}-relative path to your custom checklist.
# Example: phase_2_checklist = "{project-root}/_hbc_output/custom-checklists/phase-2.md"
phase_1_checklist = "assets/phase-1-gate-checklist.md"
phase_2_checklist = "assets/phase-2-gate-checklist.md"
phase_3_checklist = "assets/phase-3-gate-checklist.md"
phase_4_checklist = "assets/phase-4-gate-checklist.md"

# Report template for generated gate reports.
# Override to customize layout or add org-specific sections (e.g. sign-off block).
gate_report_template = "assets/gate-report-template.md"

# Output path for gate reports.
gate_output_path = "{project-root}/_hbc_output/gates"

# gate_mode (strict/lenient) is intentionally NOT here — it's project-level
# policy sourced from _bmad/config.yaml [hbc] section, not a per-skill override.

# Post-gate hook (PASSED only). Set to a skill invocation string
# (e.g. "invoke hbc-traceability") to trigger automatically after a passing gate.
on_complete = ""
