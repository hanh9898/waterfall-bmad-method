post-install-notes: |
  HBLAB BMad Custom module installed successfully!
  Required: BMM module must be installed first.
  Agents: [BA] Business Analyst (Phase 1), [ARCH] Architect (Phase 2), [QA] QA Engineer (Phase 2), [DEV] Developer (Phase 3), [TST] Tester (Phase 4)
  Phase 1 Analysis: [REQ] Requirements → [GLO] Glossary → [BFD] Business Flow
  Phase 2 Design: [ERD] ER Diagram, [CS] Coding Standards, [API] API Spec, [TP] Test Plan, [TS] Test Spec, [IR] Check Readiness
  Phase 3 Implementation: [TB] Task Breakdown, [IM] Implement (TDD)
  Phase 4 Testing: [TE] Test Execution, [AC] Acceptance Check
  Cross-cutting: [PG] Phase Gate, [TRI/TRU/TRR/TRA/SYNC] Traceability Matrix (init/update/report/audit) + Cascade Document Sync (impact)
  Start with: [BA] Business Analyst or [REQ] Create Requirements
