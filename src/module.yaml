code: hbc
name: "HBLAB BMad Custom"
header: "Custom BMad Method workflow variants by HBLAB"
subheader: "Incremental + TDD lifecycle (per-feature / staged delivery) with D-xx generation, phase gates, and traceability"
description: "Framework-agnostic incremental + TDD development lifecycle for HBLAB, applied per-feature (staged delivery). Phase 0 project-init for shared deliverables, then 4 gated phases per feature with TDD. 5 agents + 16 workflows. Expansion module — requires BMM."
