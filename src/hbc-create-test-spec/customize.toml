# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-create-test-spec.
# Team overrides:     {project-root}/_bmad/custom/hbc-create-test-spec.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-create-test-spec.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Scan script for source discovery (Stage 1 Prerequisites).
scan_script = "scripts/scan-test-spec-sources.py"

# D-27 template path.
template_path = "assets/D-27_test-spec_template.md"

# Output path for the generated D-27 document.
output_dir = "{planning_artifacts}"

# Validation script.
validation_script = "scripts/validate-test-spec.py"

# Batch size for requirement processing (how many REQs to process per discovery batch, recommended: 5-15).
req_batch_size = 10

# hbc-sync integration (REQ-005, BR-13). When true, after a successful `update`
# auto-invoke hbc-sync to cascade downstream. Default false (no behavior change).
# Skills invoked WITH --invoked-by-sync must suppress this. See hbc-sync/references/skill-integration.md
auto_sync_after_update = false
