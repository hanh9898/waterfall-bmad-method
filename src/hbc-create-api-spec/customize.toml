# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-create-api-spec.
# Team overrides:     {project-root}/_bmad/custom/hbc-create-api-spec.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-create-api-spec.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# D-21 template path. Override to use a custom template with different sections.
template_path = "assets/D-21_api-spec_template.md"

# Output path for the generated D-21 document.
output_dir = "{planning_artifacts}"

# Validation script. Override to use a custom validator with the same CLI interface.
validation_script = "scripts/validate-api-spec.py"

# API style. Options: "rest", "graphql". Default auto-detected from project-context.md.
api_style = ""

# Default authentication strategy hint. Options: "jwt", "api_key", "oauth2", "session".
auth_strategy = ""
