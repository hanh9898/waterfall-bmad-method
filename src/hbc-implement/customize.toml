# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-implement.
# Team overrides:     {project-root}/_bmad/custom/hbc-implement.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-implement.user.toml

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Path to the task breakdown file.
task_breakdown_path = "{implementation_artifacts}/task-breakdown.md"

# Coverage command (auto-detected from project-context.md if empty).
# Examples: "pytest --cov=src --cov-report=term-missing", "jest --coverage"
coverage_command = ""

# Minimum test coverage threshold.
coverage_threshold = 80

# hbc-traceability impact integration (REQ-005, BR-13). When true, after a successful `update`
# auto-invoke hbc-traceability impact to cascade downstream. Default false (no behavior change).
# Skills invoked WITH --invoked-by-sync must suppress this. See hbc-traceability/references/impact-capability.md
auto_sync_after_update = false
