# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-create-coding-standards.
# Team overrides:     {project-root}/_bmad/custom/hbc-create-coding-standards.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-create-coding-standards.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# D-12 template path. Override to use a custom template with different sections.
template_path = "assets/D-12_coding-standards_template.md"

# D-12 Coding Standards là SHARED (toàn dự án), tạo ở Phase 0.
output_dir = "{output_folder}/shared/coding-standards"

# Validation script. Override to use a custom validator with the same CLI interface.
validation_script = "scripts/validate-coding-standards.py"

# Detected or overridden framework name. Leave empty for auto-detection from project-context.md.
framework = ""

# Comment language preference for code examples in the generated D-12.
# Options: "en", "ja", "vi". Default: follows document_output_language.
comment_language = ""

# hbc-traceability impact integration (REQ-005, BR-13). When true, after a successful `update`
# auto-invoke hbc-traceability impact to cascade downstream. Default false (no behavior change).
# Skills invoked WITH --invoked-by-sync must suppress this. See hbc-traceability/references/impact-capability.md
auto_sync_after_update = false
