n't know to look for it.", "source": "architecture"}]}, {"name": "Three deterministic validation operations live in the prompt — no scripts/ directory exists", "description": "Stage 1 source-doc discovery (glob walk of `*prd*.md`, `*ux*.md`, `D-04*.md`, etc.) and Stage 4's three validation checks (Mermaid syntax parse, actor coverage, FR-to-flow traceability) are deterministic file-system and parsing work that the LLM currently re-does on every run. They burn ~2400-5200 tokens per invocation with no quality benefit and the Mermaid/actor-coverage checks have a real catch-rate gap the LLM eyeballing misses.", "severity": "high", "impact": "Recovers ~2400-5200 tokens per run and raises catch-rate on orphan Mermaid participants and uncovered FRs. Also closes the 'auto-fix in headless mode' quality risk (Stage 4's auto-fix promise has no real parse step behind it).", "action": "Add a `scripts/` directory with three small Python scripts: (1) `discover-planning-artifacts.py` — the pre-pass that walks `{planning_artifacts}` and emits compact JSON of PRD/UX/research candidates; (2) `validate-mermaid.py` — extracts Mermaid blocks, parses participant/message declarations, accepts an `--expected-actors` arg, returns findings JSON (folds S2 and S4 together); (3) `check-fr-coverage.py` — extracts FR identifiers from PRD and D-06 and returns covered/uncovered/phantom sets. Wire them in as pre-pass (S1 before Stage 2) and post-pass (S2-S4 in Stage 4). The LLM keeps the judgment calls — actor identification, AS-IS/TO-BE delta, layout choice.", "finding_count": 4, "findings": [{"title": "PRD/UX/research discovery scan done in-prompt", "file": "SKILL.md", "line": 52, "detail": "LLM glob-walks `{planning_artifacts}` for `*prd*.md`, `*ux*.md`, `D-04*.md`, `D-05*.md`, `research/*.md`. ~600-1300 tokens/run of pure file-system work.", "source": "determinism"}, {"title": "Mermaid syntax validation done by reading", "file": "SKILL.md", "line": 94, "detail": "'Each code block parses; no orpha og says Simple; `### Stage N` headings are the Complex shape; prepass infers `workflow_type: complex`. The skill is genuinely Simple — the heading style is the only thing fighting the claim.", "source": "architecture"}, {"title": "Stage 1 packs workspace binding + decision-log seeding into one dense paragraph", "file": "SKILL.md", "line": 66, "detail": "Single sentence carries the workspace contract — workspace-binding mechanics and decision-log seeding should be separate bullets so the model doesn't disentangle them in one read.", "source": "architecture"}, {"title": "On Complete re-resolves the workflow block (wasted call)", "file": "SKILL.md", "line": 108, "detail": "Activation Step 1 already resolved `workflow.*` including `on_complete`. The second resolver call is harmless but wasted; either read from memory or document why it re-resolves.", "source": "architecture"}]}, {"name": "[ADDENDUM B1] Replace silent no-PRD fallback with HALT-menu (3 options)", "description": "`SKILL.md:58` currently says 'switch to interactive elicitation' when no PRD found. BMad-native pattern is an explicit HALT menu with three options + `[q]` quit, not a silent fallback. This also closes the 'no-PRD + headless self-contradicting elicitation' branch in Opp #2.", "severity": "high", "impact": "Removes the silent-fallback ambiguity in interactive mode and the self-contradicting elicitation in headless mode. Makes pipeline behavior explicit and pageable.", "action": "Replace `SKILL.md:58` with a HALT menu: '🚫 No PRD found in {planning_artifacts}. Options: [1] Run bmad-create-prd first, [2] Provide PRD path, [3] Continue interactive (greenfield, no source), [q] Quit'. In headless: only accept option 2 via `--prd-path=`, else return `blocked` with `reason: \"no_prd_and_no_interactive_in_headless\"`. Precedent: `bmad-create-story/SKILL.md:102-127`, `bmad-create-architecture/steps/step-01-init.md:89`.", "finding_count": 1, "findings": [{"title": "Silent fallback to elicitation when no PRD found", "file": "SKILL.md", "line": 58, "detail": "Current rule rolls into elicitation without menu — pipeline can't audit which branch fired.", "source": "addendum-bmad-pattern"}]}, {"name": "[ADDENDUM B2] Add `[A][P][C]` parallel-validation menu after Stage 3 and Stage 4", "description": "BMad pattern for a parallel-validation lens: `[A] Advanced Elicitation / [P] Party Mode / [C] Continue`. `[A]` invokes bmad-advanced-elicitation to stress-test actor coverage; `[P]` invokes bmad-party-mode for multi-perspective review. HBC sibling INVEST already adopts this.", "severity": "medium", "impact": "Catches the actor-coverage and flow-completeness gaps single-lens validation misses, without forcing every run through a heavier multi-agent pass. In headless: skip menu, default `[C]`, log auto-decision to .decision-log.md.", "action": "Insert an `[A][P][C]` menu at the end of Stage 3 (after diagram generation, before Stage 4 validation) and at the end of Stage 4 (after validation, before save). Precedent: `bmad-create-architecture/steps/step-07-validation.md:26-37, 308-322`; `hbc-create-invest-epics-and-stories/references/story-generation.md:121`.", "finding_count": 2, "findings": [{"title": "No parallel-elicitation hook after Stage 3 (Diagram Generation)", "file": "SKILL.md", "line": 80, "detail": "Diagrams render and immediately enter single-lens validation. No moment to stress-test actor coverage before validation locks in.", "source": "addendum-bmad-pattern"}, {"title": "No parallel-elicitation hook after Stage 4 (Validation)", "file": "SKILL.md", "line": 98, "detail": "Validation findings are presented but no offer to invoke multi-perspective review before save. HBC sibling INVEST already has this hook.", "source": "addendum-bmad-pattern"}]}, {"name": "[ADDENDUM B3] Add template-existence check at Stage 1", "description": "`{workflow.business_flow_template}` points to a path outside the default BMad install (`{project-root}/templates/D-06_business-flow-diagram_template.md`). HBC siblings don't validate template existence; this skill should set the precedent.", "severity": "medium", "impact": "Replaces an opaque mid-workflow failure ('template not found' partway through rendering) with an early, actionable halt with remediation hint.", "action": "At Stage 1 entry (before binding `{doc_workspace}`), check if `{workflow.business_flow_template}` exists. If not: halt with hint to run `hbc-setup` or clone the shared D-* template set. In headless: return `blocked` with `reason: \"template_missing\"`.", "finding_count": 1, "findings": [{"title": "Template-existence check absent", "file": "SKILL.md", "line": 50, "detail": "Skill proceeds into Stage 1 scan without verifying the configured template file exists. Failure mode is partway-through-render rather than upfront halt.", "source": "addendum-hbc-convention"}]}, {"name": "[ADDENDUM B5] Establish `assets/decision-log-template.md` as HBC first-mover convention", "description": "Neither HBC sibling (INVEST, setup) uses `.decision-log.md` — this skill is the first mover. Define a minimal schema now so future HBC skills follow consistently. Also addresses the structural issue in the original 'broken #2' (decision-log location).", "severity": "medium", "impact": "Sets durable house style for HBC. Future HBC skills get a frontmatter convention (`stepsCompleted`, `inputDocuments`, `lastStep`) compatible with BMad-base resume protocols (see Opp #1 reinforcement).", "action": "Create `src/hbc-create-business-flow-diagram/assets/decision-log-template.md` per HBC `assets/<*>-template.md` convention. Schema: frontmatter (`skill`, `phase`, `classification`, `last_touched`, `stepsCompleted`, `inputDocuments`) + per-session block (`## Session YYYY-MM-DDTHH:MM — {Intent}` with Sources, Mode/Scope, Auto-fixes, Handoff target).", "finding_count": 1, "findings": [{"title": "No decision-log schema/template defined for HBC", "file": "assets/", "line": 0, "detail": "HBC siblings don't have decision-log convention. This skill could become first-mover; defining a template now prevents drift across future HBC skills.", "source": "addendum-hbc-convention"}]}, {"name": "[ADDENDUM B7] Backport BFD row to `hbc-setup/assets/module-help.csv`", "description": "`hbc-setup/assets/module-help.csv` currently has one row (INVEST). The new BFD skill is registered in `_bmad/_config/bmad-help.csv:57` but is missing from the HBC module CSV. Without this, `hbc-setup` won't install the full HBC skill set in a new project.", "severity": "medium", "impact": "Restores the install-time contract that `hbc-setup` covers all HBC skills. Without this row, fresh projects miss BFD entirely.", "action": "Add a row to `hbc-setup/assets/module-help.csv` mirroring the `_bmad/_config/bmad-help.csv` BFD entry (skill name, display name, menu code, description, phase, before/after). Verify the `before`/`after` fields chain BFD correctly between PRD and Architecture in the planning phase.", "finding_count": 1, "findings": [{"title": "BFD missing from HBC module-help registry", "file": "../hbc-setup/assets/module-help.csv", "line": 0, "detail": "`hbc-setup` install won't surface BFD as an installable HBC skill until this row is added.", "source": "addendum-hbc-integration"}]}, {"name": "`output_dir` + `output_folder_name` split is a permutation surface", "description": "Two scalars combine on activation to produce `{doc_workspace}`. The factoring lets a team choose parent dir and folder template independently, but in practice teams want one path. Users overriding `output_folder_name` to drop `{date}` won't realize `output_dir` is also configurable and will hit a half-override.", "severity": "medium", "impact": "Halves the cognitive load of the output-path surface and removes the half-override risk. Also clears the path to fix the dated-folder-fights-resume issue cleanly.", "action": "Collapse to one scalar `business_flow_output_path = \"{planning_artifacts}/business-flows/D-06-{project_name}-{date}/\"` and bind `{doc_workspace}` directly to the resolved value in Stage 1. Specify `{date}` format in the comment (commonly `YYYY-MM-DD`).", "finding_count": 2, "findings": [{"title": "Two-scalar output path forces a two-step mental model", "file": "customize.toml", "line": 35, "detail": "`{doc_workspace} = {output_dir}/{output_folder_name}/` — independent factoring buys nothing in practice and risks half-overrides.", "source": "customization"}, {"title": "`{date}` format unspecified in `output_folder_name` default", "file": "customize.toml", "line": 35, "detail": "`D-06-{project_name}-{date}` — collide-or-accumulate on same-day re-runs depending on format choice (`2026-05-14` vs `20260514` vs `2026-05-14T19:23`). Specify in the comment.", "source": "customization"}]}], "strengths": [{"title": "Right size, right shape — inline-first Simple Workflow", "detail": "~113 lines, all inline in SKILL.md + customize.toml, no `references/` carve-out, no scripts, no `assets/`. Matches the principles file's 'inline first, carve out only when needed' guidance for a single-artifact workflow."}, {"title": "Customization surface is clean and resisted the loudest temptations", "detail": "Six scalars + one persistent-fact array + two activation arrays. No boolean toggles, no hooks beyond `on_complete`, identity/persona kept out of `[workflow]`. The two anti-findings (migration-vs-greenfield as toggle, per-skill language override) were correctly *not* added — both are runtime per-conversation state."}, {"title": "Language-rule handling is explicit and correct", "detail": "Distinguishes `{communication_language}` (user-facing) from `{document_output_language}` (artifact-facing) and explicitly carves out Mermaid keywords as English. Exactly the kind of judgment context that earns its place in the prompt."}, {"title": "Downstream consumers named explicitly", "detail": "`bmad-create-architecture`, `bmad-create-ux-design`, `bmad-create-epics-and-stories`, `hbc-create-invest-epics-and-stories` — the workflow knows where it sits in the BMM phase chain, which makes the Stage 5 distillate handoff legible."}, {"title": "Graceful degradation on bmad-distillator", "detail": "'Skip with a note if distillator is unavailable; never inline a substitute' — follows the principles file's graceful-degradation rule cleanly. (Template-absent and resolver-absent on On Complete still need the same treatment.)"}, {"title": "Description format is well-disciplined", "detail": "Quoted trigger phrases including a Vietnamese trigger matching the configured `document_output_language`. Summary plus triggers, no padding."}, {"title": "Headless considered as a first-class mode at the structural level", "detail": "JSON return shape, decision-log auto-fix logging in headless, and 'absence of PRD is a normal mode' are all named. The contract isn't complete (see opportunities) but the foundation is there."}, {"title": "No deterministic work currently hidden in scripts", "detail": "Zero scripts means zero risk of 'intelligence leak into scripts' from regex-based meaning extraction. A clean baseline for the script-extraction work in the determinism findings — any added scripts should stay strictly in the plumbing lane."}], "detailed_analysis": {"architecture": {"assessment": "A coherent, well-scoped Simple Workflow living entirely in `SKILL.md` + `customize.toml` — the right shape for its complexity. Routing, customization wiring, language discipline, and the Decision-Log Workspace seeding are all correct. Findings are tidy-ups: missing `## Overview`, a `### Stage N` heading style that contradicts the Simple claim, and ~25 lines of On-Activation boilerplate inherited from the build template.", "findings": []}, "determinism": {"assessment": "The skill is mostly judgment work (actor identification, AS-IS/TO-BE delta, layout choices) and belongs in the prompt. But Stage 1's source-doc glob walk and Stage 4's three validation checks (Mermaid parse, actor coverage, FR traceability) are textbook script candidates — pure parsing and set-membership work the LLM currently re-does every run. A single `scripts/` directory with three small Python scripts converts this into a compact pre-pass/post-pass JSON exchange.", "token_savings": "~2400-5200 tokens per run (S1 ~600-1300, S2 ~600-1000, S3 ~1000-2500 on PRD-backed runs, S4 ~200-400)", "findings": []}, "customization": {"assessment": "Opted in with the full BMad always-present surface plus four workflow-specific scalars. All scalars, no arrays-of-tables, no boolean toggles, no hooks beyond `on_complete`. The two temptations from the context conversation (migration-mode toggle, per-skill language override) were correctly resisted. One real abuse remains — the `output_dir` + `output_folder_name` split should collapse to a single `business_flow_output_path`.", "posture": "opted-in", "findings": []}, "enhancement": {"assessment": "Headless mode is named but not specified; the Decision-Log Workspace pattern is half-built (no resume, no Update, no compaction flush). Stage 1 trades open-floor warmth for a four-question form. The skill works on the first pass and falls apart on revisit — exactly the failure mode the Workspace pattern was designed to prevent.", "journeys": [{"archetype": "first-timer", "summary": "BA activating after `bmad-create-prd`. The four Stage-1 questions arrive as a flat batch with no anchor for consequences; greenfield-vs-migration is picked blind, losing the AS-IS the PM wanted. Bright spot: the workspace folder is created up front and the decision log captures the mode/scope choice, so a wrong pick is recoverable on a re-run.", "friction_points": ["greenfield-vs-migration choice presented with no anchor for downstream impact", "Four-question grid arrives with no open-floor invitation to volunteer unexpected inputs (Miro export, hand-drawn sketch, prior architect's notes)"], "bright_spots": ["Workspace + decision log capture mode/scope, making wrong picks recoverable on re-run"]}, {"archetype": "expert", "summary": "BA on the fifth project this quarter — wants to slam through Stage 1 with 'use the PRD, migration, multi-flow, sequenceDiagram — go'. No Yolo / quick-confirm middle exists; the four-question dance fires every run even when the PRD's structure makes the answers obvious.", "friction_points": ["No single inferred-defaults confirmation block — must answer four serial questions", "No 'I've already structured the PRD with explicit AS-IS/TO-BE — just lift them' shortcut"], "bright_spots": []}, {"archetype": "confused", "summary": "User says 'tạo sơ đồ' meaning a class diagram; trigger matches loosely enough that this skill activates. The skill scans `{planning_artifacts}` and asks about modes before the user realizes it's the wrong skill.", "friction_points": ["No early intent-confirm before the artifact scan", "No off-ramp signposting sibling skills"], "bright_spots": []}, {"archetype": "edge-case", "summary": "Genuine inputs the skill does not handle deterministically: zero-actor PRDs (pure data-pipeline products), sharded PRDs (fallback reads only index.md and misses substance), multiple PRDs in the same folder, no PRD AND no UX in headless mode, mis-marked migration on pure greenfield, and re-runs (no resume path; user gets fresh discovery on top of an existing artifact).", "friction_points": ["Sharded PRD fallback reads only `index.md` — misses every actor and FR (high-severity, broken)", "No resume protocol — re-run = fresh draft, prior reasoning lost", "No targeted-update for a single flow — rebuilds everything", "Multiple-PRD disambiguation absent — generous glob takes whatever it finds first", "Zero-actor PRDs render a vacuous diagram (System talking to itself) — no guidance to promote trigger/cron to first-class actor"], "bright_spots": ["Falls back to interactive elicitation when no PRD present and explicitly calls this out as 'a normal mode, not a blocker'"]}, {"archetype": "hostile-environment", "summary": "Resolver fallback exists for Stage 1 but not for the On-Complete resolver call. Template-file-missing has no fallback (skill halts). Compaction mid-Stage-2 loses the AS-IS/TO-BE discovery work because Stage 2 doesn't flush to the decision log. Bmad-distillator gracefully skipped (correctly).", "friction_points": ["Template-file-missing halts the skill — no skeleton fallback", "Stage 2 holds discovered state in conversation only — compaction drops it", "On Complete resolver invocation has no fallback documented"], "bright_spots": ["`bmad-distillator` unavailable correctly skipped with a note, never inlined as substitute"]}, {"archetype": "automator", "summary": "Pipeline calls `hbc-create-business-flow-diagram --headless` after `bmad-create-prd`. Stage 1's four interactive confirmations are not mapped to headless defaults, so different runs against the same PRD silently choose different modes/scopes/fixes. No documented input contract for overriding inferred defaults. When PRD is absent in headless, the skill contradicts itself by falling into elicitation instead of returning `status: blocked`. JSON return shape itself is correct and minimal.", "friction_points": ["Headless defaults for each interactive decision unspecified — non-deterministic across runs", "No documented `--mode` / `--scope` / `--diagram-type` input flags", "No-PRD + headless = silent elicitation contradiction"], "bright_spots": ["JSON return shape `{status, skill, primary, decision_log}` is minimal and correct (though `primary` is non-canonical)"]}], "autonomous": {"potential": "easily-adaptable", "notes": "Core artifact creation can run headless today, but Stage 1's four-question discovery and Stage 2's actor/trigger confirmation need an explicit headless-defaults table and an input contract for overriding them. The 'no PRD + headless' branch needs to return blocked rather than fall into elicitation."}, "findings": []}}, "recommendations": [{"rank": 1, "action": "Wire the Decision-Log Workspace pattern fully: add resume-on-re-activation (Create/Update/Validate intents), flush Stage 2 discovered state to the decision log so compaction can't drop it, append (don't overwrite) revision-history rows on Update mode, and either document or fix the dated-folder-name fights-resume tension.", "resolves": 4, "effort": "medium"}, {"rank": 2, "action": "Specify the headless contract: a one-line headless default next to every interactive decision in Stages 1, 2, and 4; a documented input flag set (`--prd`, `--mode`, `--scope`, `--diagram-type`, `--no-prd-ok`); and a `status: blocked` branch when PRD is absent under `--headless`. Also rename/document the non-canonical `primary` JSON field.", "resolves": 3, "effort": "low"}, {"rank": 3, "action": "Add a `scripts/` directory with three Python scripts — `discover-planning-artifacts.py`, `validate-mermaid.py` (folding actor-coverage in), `check-fr-coverage.py` — and wire them as pre-pass (S1 before Stage 2) and post-pass (S2-S4 in Stage 4). Recovers ~2400-5200 tokens/run and closes the headless-auto-fix quality risk.", "resolves": 4, "effort": "medium"}, {"rank": 4, "action": "Refactor Stage 1 into a facilitative shape: open-floor invitation + one-line intent gate + single inferred-defaults confirmation block (replacing the four-question grid) + one-sentence off-ramp for clearly-not-a-business-flow inputs. Add a parallel skeptic + actor-coverage scout sub-step before Stage 4 finalizes.", "resolves": 5, "effort": "low"}, {"rank": 5, "action": "Collapse On Activation Steps 1-5 to the canonical 5-line block, drop the manual TOML hand-merge fallback (halt-and-report on resolver absence instead), and lift the workflow-wide language rules out of Step 5 into their own paragraph above `## Workflow`.", "resolves": 3, "effort": "low"}, {"rank": 6, "action": "Tidy structural surface: insert `## Overview` heading, rename `### Stage N: …` to neutral sectional headings to honor the Simple-Workflow claim, split Stage 1's workspace paragraph into separate bullets for binding vs decision-log seeding, and have On Complete read `{workflow.on_complete}` from the already-resolved block instead of re-resolving.", "resolves": 4, "effort": "low"}, {"rank": 7, "action": "Collapse `output_dir` + `output_folder_name` to a single `business_flow_output_path` scalar with `{date}` format specified in the comment.", "resolves": 2, "effort": "low"}, {"rank": 8, "action": "Fix the broken sharded-PRD fallback rule (read every linked shard, not just `index.md`) and move `.decision-log.md` to `references/.decision-log.md` (or delete if it was build-time scratch).", "resolves": 2, "effort": "low"}, {"rank": 9, "action": "[ADDENDUM] Add HALT-menu when no PRD found (B1) — replaces silent fallback in interactive mode; returns `blocked` with reason in headless. Resolves the no-PRD-elicitation contradiction in headless.", "resolves": 1, "effort": "low"}, {"rank": 10, "action": "[ADDENDUM] Insert `[A][P][C]` parallel-validation menu after Stage 3 and Stage 4 (B2). Adopt the BMad multi-lens pattern already used by HBC sibling INVEST.", "resolves": 2, "effort": "low"}, {"rank": 11, "action": "[ADDENDUM] Add template-existence check at Stage 1 (B3). Halt with remediation hint if `{workflow.business_flow_template}` missing; return blocked in headless.", "resolves": 1, "effort": "low"}, {"rank": 12, "action": "[ADDENDUM] Create `assets/decision-log-template.md` as HBC first-mover schema (B5). Pairs with the Decision-Log Workspace work in Rec #1 and gives future HBC skills a consistent format.", "resolves": 1, "effort": "low"}, {"rank": 13, "action": "[ADDENDUM] Backport BFD row to `hbc-setup/assets/module-help.csv` (B7). Without this, fresh projects miss the BFD skill at install time.", "resolves": 1, "effort": "low"}], "applied_changes": [{"date": "2026-05-14", "target": "templates/D-06_業務フロー図_template.md", "change": "Renamed to templates/D-06_business-flow-diagram_template.md (Rule 1: file names always English). File was untracked; used `mv` not `git mv`."}, {"date": "2026-05-14", "target": "templates/D-06_business-flow-diagram_template.md", "change": "Content rewritten as English i18n source. All Japanese headings/labels translated to English. AS-IS / TO-BE kept untranslated as business jargon (carve-out). Mermaid keywords and code identifiers kept original."}, {"date": "2026-05-14", "target": "src/hbc-create-business-flow-diagram/customize.toml:24", "change": "Updated `business_flow_template` path to point to the renamed template file."}, {"date": "2026-05-14", "target": "src/hbc-create-business-flow-diagram/SKILL.md:43-47", "change": "Language-rules block rewritten with three-rule split: communicate in {communication_language}; template is English i18n source — translate to {document_output_language} at render time; file/folder names always English; carve-outs (Mermaid keywords/identifiers, AS-IS/TO-BE) stay original in both template and output."}, {"date": "2026-05-14 (round 3)", "target": ".decision-log.md location", "change": "RESOLVED broken #2. Moved src/hbc-create-business-flow-diagram/.decision-log.md → references/.decision-log.md. Confirmed by re-running scan-path-standards.py (structure category: 0 findings)."}, {"date": "2026-05-14 (round 3)", "target": "src/hbc-create-business-flow-diagram/customize.toml", "change": "RESOLVED Op #7. Collapsed output_dir + output_folder_name → business_flow_output_path single scalar with {date}=YYYY-MM-DD documented in comment + guidance for resume override. Also tightened diagram_type comment to clarify it is a hint, not a contract (per Customization scanner anti-finding)."}, {"date": "2026-05-14 (round 3)", "target": "src/hbc-setup/assets/module-help.csv", "change": "RESOLVED B7. Added BFD row mirroring _bmad/_config/bmad-help.csv:57 (phase 2-planning, after bmad-create-prd, before bmad-create-architecture)."}, {"date": "2026-05-14 (round 3)", "target": "src/hbc-create-business-flow-diagram/assets/decision-log-template.md", "change": "RESOLVED B5. Created HBC first-mover decision-log schema (frontmatter + per-session block format) for runtime artifact at {doc_workspace}/.decision-log.md."}, {"date": "2026-05-14 (round 3)", "target": "src/hbc-create-business-flow-diagram/scripts/", "change": "RESOLVED Op #3 (Path B) + B3. Created discover-planning-artifacts.py (includes template-existence check + sharded-PRD shard enumeration which RESOLVES broken #1), validate-mermaid.py (Mermaid syntax + actor coverage), check-fr-coverage.py (FR id covered/uncovered/phantom sets). All stdlib Python, smoke-tested OK."}, {"date": "2026-05-14 (round 3)", "target": "src/hbc-create-business-flow-diagram/SKILL.md (comprehensive rewrite)", "change": "RESOLVED Op #1 (Decision-Log Workspace pattern — Stage 1a resume detection with R/U/V/N/X menu, Stage 2 compaction flush to frontmatter + decision log, Stage 3 revision-history increment on Update mode), Op #2 (Headless Mode section with input flags table + defaults table + JSON contract — primary renamed to artifact, named reason values), Op #3 (scripts wired in Stage 1b and Stage 4), Op #4 (dropped hand-merge fallback, lifted Language Rules out of activation block — kept 5-step structure per anti-finding C), Op #5 (Stage 1 facelift: 1a-1e subsections with open-floor invitation, intent gate, no-PRD HALT-menu, inferred-defaults block, wrong-skill off-ramp), Op #6 (added ## Overview, renamed ### Stage N to neutral numbered subsections, On Complete reads from memory, split Stage 1 paragraph), B1 (HALT-menu Stage 1d), B2 ([A][P][C] menus at end of Stage 3 and Stage 4), B3 (template-existence check at Stage 1b reacting to discover script). Final size: ~200 lines (was ~113)."}]}</script>
<script>
const RAW = JSON.parse(document.getElementById('report-data').textContent);
const DATA = normalize(RAW);

function normalize(d) {
  // Fix meta field variants
  if (d.meta) {
    d.meta.skill_name = d.meta.skill_name || d.meta.skill || d.meta.name || 'Unknown';
    d.meta.scanner_count = typeof d.meta.scanner_count === 'number' ? d.meta.scanner_count
      : Array.isArray(d.meta.scanners_run) ? d.meta.scanners_run.length
      : d.meta.scanner_count || 0;
  }
  // Fix strengths: plain strings → objects
  d.strengths = (d.strengths || []).map(s =>
    typeof s === 'string' ? { title: s, detail: '' } : { title: s.title || '', detail: s.detail || '' }
  );
  // Fix opportunities: title→name, findings_resolved→findings
  (d.opportunities || []).forEach(o => {
    o.name = o.name || o.title || '';
    o.finding_count = o.finding_count || (o.findings || o.findings_resolved || []).length;
    if (!o.findings && o.findings_resolved) o.findings = [];
    o.action = o.action || o.fix || '';
  });
  // Fix broken: description→detail, fix→action
  (d.broken || []).forEach(b => {
    b.detail = b.detail || b.description || '';
    b.action = b.action || b.fix || '';
  });
  // Fix recommendations: description→action
  (d.recommendations || []).forEach((r, i) => {
    r.action = r.action || r.description || '';
    r.rank = r.rank || i + 1;
  });
  // Fix journeys: persona→archetype, friction→friction_points
  // Accept both `enhancement` (new) and `experience` (legacy) section keys
  const expSection = d.detailed_analysis && (d.detailed_analysis.enhancement || d.detailed_analysis.experience);
  if (expSection) {
    expSection.journeys = (expSection.journeys || []).map(j => ({
      archetype: j.archetype || j.persona || j.name || 'Unknown',
      summary: j.summary || j.journey_summary || j.description || j.friction || '',
      friction_points: j.friction_points || (j.friction ? [j.friction] : []),
      bright_spots: j.bright_spots || (j.bright ? [j.bright] : [])
    }));
  }
  return d;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function init() {
  const m = DATA.meta;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').innerHTML =
    `${esc(m.skill_path)} &bull; ${m.timestamp ? m.timestamp.split('T')[0] : ''} &bull; ${m.scanner_count || 0} scanners &bull; <a href="quality-report.md">Full Report &nearr;</a>`;

  document.getElementById('grade-area').innerHTML =
    `<div class="grade grade-${DATA.grade}">${esc(DATA.grade)}</div>`;
  document.getElementById('narrative').textContent = DATA.narrative || '';

  renderBroken();
  renderOpportunities();
  renderStrengths();
  renderUserExperience();
  renderRecommendations();
  renderDetailed();
}

function renderBroken() {
  const items = DATA.broken || [];
  if (!items.length) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Broken / Critical (${items.length})</span>`;
  html += `<div class="actions"><button class="btn btn-primary" onclick="event.stopPropagation();showBrokenPrompt()">Fix These</button></div>`;
  html += `</div><div class="section-body open">`;
  items.forEach(item => {
    const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
    html += `<div class="item">`;
    html += `<span class="badge badge-${item.severity || 'high'}">${esc(item.severity || 'high')}</span> `;
    if (loc) html += `<span class="item-file">${esc(loc)}</span>`;
    html += `<div class="item-title">${esc(item.title)}</div>`;
    if (item.detail) html += `<div class="item-desc">${esc(item.detail)}</div>`;
    if (item.action) html += `<div class="item-action"><strong>Fix:</strong> ${esc(item.action)}</div>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('broken-section').innerHTML = html;
}

function renderOpportunities() {
  const opps = DATA.opportunities || [];
  if (!opps.length) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Opportunities (${opps.length})</span>`;
  html += `</div><div class="section-body open">`;
  opps.forEach((opp, idx) => {
    html += `<div class="opp">`;
    html += `<div class="opp-header">`;
    html += `<span class="badge badge-${opp.severity || 'medium'}">${esc(opp.severity || 'medium')}</span>`;
    html += `<span class="opp-name">${idx+1}. ${esc(opp.name)}</span>`;
    html += `<span class="opp-count">${opp.finding_count || (opp.findings||[]).length} observations</span>`;
    html += `<button class="btn" onclick="toggleFindings(${idx})">Details</button>`;
    html += `<button class="btn btn-primary" onclick="showThemePrompt(${idx})">Fix This</button>`;
    html += `</div>`;
    html += `<div class="opp-desc">${esc(opp.description)}</div>`;
    if (opp.impact) html += `<div class="opp-impact">Impact: ${esc(opp.impact)}</div>`;
    html += `<div class="opp-findings" id="findings-${idx}">`;
    (opp.findings || []).forEach(f => {
      const loc = f.file ? `${f.file}${f.line ? ':'+f.line : ''}` : '';
      html += `<div class="opp-finding">`;
      html += `<strong>${esc(f.title)}</strong>`;
      if (loc) html += ` <span class="item-file">${esc(loc)}</span>`;
      if (f.source) html += ` <span class="source">[${esc(f.source)}]</span>`;
      if (f.detail) html += `<br>${esc(f.detail)}`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div></div>`;
  document.getElementById('opportunities-section').innerHTML = html;
}

function renderStrengths() {
  const items = DATA.strengths || [];
  if (!items.length) return;
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Strengths (${items.length})</span>`;
  html += `</div><div class="section-body">`;
  items.forEach(s => {
    html += `<div class="strength-item"><div class="title">${esc(s.title)}</div>`;
    if (s.detail) html += `<div class="detail">${esc(s.detail)}</div>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('strengths-section').innerHTML = html;
}

function renderRecommendations() {
  const recs = DATA.recommendations || [];
  if (!recs.length) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Recommendations</span>`;
  html += `</div><div class="section-body open"><div class="recs">`;
  recs.forEach(r => {
    html += `<div class="rec">`;
    html += `<span class="rec-rank">#${r.rank}</span>`;
    html += `${esc(r.action)}`;
    if (r.resolves) html += ` <span class="rec-resolves">(resolves ${r.resolves} observations)</span>`;
    html += `</div>`;
  });
  html += `</div></div></div>`;
  document.getElementById('recommendations-section').innerHTML = html;
}

function renderUserExperience() {
  const ux = DATA.detailed_analysis && DATA.detailed_analysis.enhancement;
  if (!ux) return;
  let html = `<div class="section"><div class="section-header open" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">User Experience</span>`;
  html += `</div><div class="section-body open">`;
  if (ux.assessment) html += `<p>${esc(ux.assessment)}</p>`;
  if (ux.journeys && ux.journeys.length) {
    html += `<div style="margin:1rem 0"><strong>User Journeys:</strong></div>`;
    ux.journeys.forEach(j => {
      html += `<div style="margin:0.75rem 0;padding:0.75rem;border-left:3px solid var(--accent);background:var(--surface2);">`;
      html += `<div style="font-weight:600;margin-bottom:0.5rem">${esc(j.archetype)}</div>`;
      html += `<p style="margin:0 0 0.5rem 0;font-size:0.95rem">${esc(j.summary || '')}</p>`;
      if (j.friction_points && j.friction_points.length) {
        html += `<div style="color:var(--high);font-size:0.85rem;margin:0.25rem 0"><strong>Friction Points:</strong></div>`;
        html += `<ul style="margin:0.25rem 0 0.5rem 1.25rem;color:var(--high);font-size:0.85rem">`;
        j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
        html += `</ul>`;
      }
      if (j.bright_spots && j.bright_spots.length) {
        html += `<div style="color:var(--strength);font-size:0.85rem;margin:0.25rem 0"><strong>Bright Spots:</strong></div>`;
        html += `<ul style="margin:0.25rem 0 0 1.25rem;color:var(--strength);font-size:0.85rem">`;
        j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
        html += `</ul>`;
      }
      html += `</div>`;
    });
  }
  if (ux.autonomous) {
    const a = ux.autonomous;
    html += `<div style="margin:1rem 0;padding:0.75rem;background:var(--surface2);border-left:3px solid var(--suggestion);">`;
    html += `<div style="font-weight:600;margin-bottom:0.5rem">Headless / Automation Potential</div>`;
    html += `<div><strong>${esc(a.potential || '')}</strong>`;
    if (a.notes) html += `: ${esc(a.notes)}`;
    html += `</div></div>`;
  }
  (ux.findings || []).forEach(f => {
    const loc = f.file ? `${f.file}${f.line ? ':'+f.line : ''}` : '';
    html += `<div class="analysis-finding">`;
    if (f.severity) html += `<span class="badge badge-${f.severity}">${esc(f.severity)}</span> `;
    html += `${esc(f.title)}`;
    if (loc) html += ` <span class="item-file">${esc(loc)}</span>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('user-experience-section').innerHTML = html;
}

function renderDetailed() {
  const da = DATA.detailed_analysis;
  if (!da) return;
  const dims = [
    ['architecture', 'Architecture (Structure, Craft, Cohesion)'],
    ['determinism', 'Determinism & Distribution'],
    ['customization', 'Customization Surface']
  ];
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">&#9654;</span><span class="label">Detailed Analysis</span>`;
  html += `</div><div class="section-body">`;
  dims.forEach(([key, label]) => {
    const dim = da[key];
    if (!dim) return;
    html += `<div class="analysis-section"><h4>${label}</h4>`;
    if (dim.assessment) html += `<p>${esc(dim.assessment)}</p>`;
    if (dim.dimensions) {
      html += `<table style="width:100%;font-size:0.85rem;margin:0.5rem 0;border-collapse:collapse;">`;
      html += `<tr><th style="text-align:left;padding:0.3rem;border-bottom:1px solid var(--border)">Dimension</th><th style="text-align:left;padding:0.3rem;border-bottom:1px solid var(--border)">Score</th><th style="text-align:left;padding:0.3rem;border-bottom:1px solid var(--border)">Notes</th></tr>`;
      Object.entries(dim.dimensions).forEach(([d, v]) => {
        if (v && typeof v === 'object') {
          html += `<tr><td style="padding:0.3rem;border-bottom:1px solid var(--border)">${esc(d.replace(/_/g,' '))}</td><td style="padding:0.3rem;border-bottom:1px solid var(--border)">${esc(v.score||'')}</td><td style="padding:0.3rem;border-bottom:1px solid var(--border)">${esc(v.notes||'')}</td></tr>`;
        }
      });
      html += `</table>`;
    }
    if (dim.journeys && dim.journeys.length) {
      dim.journeys.forEach(j => {
        html += `<div style="margin:0.5rem 0"><strong>${esc(j.archetype)}</strong>: ${esc(j.summary || j.journey_summary || '')}`;
        if (j.friction_points && j.friction_points.length) {
          html += `<ul style="color:var(--high);font-size:0.85rem;padding-left:1.25rem">`;
          j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
          html += `</ul>`;
        }
        html += `</div>`;
      });
    }
    if (dim.autonomous) {
      const a = dim.autonomous;
      html += `<p><strong>Headless Potential:</strong> ${esc(a.potential||'')}`;
      if (a.notes) html += ` — ${esc(a.notes)}`;
      html += `</p>`;
    }
    (dim.findings || []).forEach(f => {
      const loc = f.file ? `${f.file}${f.line ? ':'+f.line : ''}` : '';
      html += `<div class="analysis-finding">`;
      if (f.severity) html += `<span class="badge badge-${f.severity}">${esc(f.severity)}</span> `;
      html += `${esc(f.title)}`;
      if (loc) html += ` <span class="item-file">${esc(loc)}</span>`;
      html += `</div>`;
    });
    html += `</div>`;
  });
  html += `</div></div>`;
  document.getElementById('detailed-section').innerHTML = html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleFindings(idx) {
  document.getElementById('findings-'+idx).classList.toggle('open');
}

// --- Prompt Generation ---
function showThemePrompt(idx) {
  const opp = DATA.opportunities[idx];
  if (!opp) return;
  let prompt = `## Task: ${opp.name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += `### Problem\n${opp.description}\n\n`;
  prompt += `### Fix\n${opp.action}\n\n`;
  if (opp.findings && opp.findings.length) {
    prompt += `### Specific observations to address:\n\n`;
    opp.findings.forEach((f, i) => {
      const loc = f.file ? (f.line ? `${f.file}:${f.line}` : f.file) : '';
      prompt += `${i+1}. **${f.title}**`;
      if (loc) prompt += ` (${loc})`;
      if (f.detail) prompt += `\n   ${f.detail}`;
      prompt += `\n`;
    });
  }
  document.getElementById('modal-title').textContent = `Fix: ${opp.name}`;
  document.getElementById('modal-content').textContent = prompt.trim();
  document.getElementById('modal').classList.add('visible');
}

function showBrokenPrompt() {
  const items = DATA.broken || [];
  let prompt = `## Task: Fix Critical Issues\nSkill path: ${DATA.meta.skill_path}\n\n`;
  items.forEach((item, i) => {
    const loc = item.file ? (item.line ? `${item.file}:${item.line}` : item.file) : '';
    prompt += `${i+1}. **[${(item.severity||'high').toUpperCase()}] ${item.title}**\n`;
    if (loc) prompt += `   File: ${loc}\n`;
    if (item.detail) prompt += `   Context: ${item.detail}\n`;
    if (item.action) prompt += `   Fix: ${item.action}\n`;
    prompt += `\n`;
  });
  document.getElementById('modal-title').textContent = 'Fix Critical Issues';
  document.getElementById('modal-content').textContent = prompt.trim();
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal .btn-primary');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

init();
</script>
</body>
</html>
