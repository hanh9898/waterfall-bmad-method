# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-create-business-flow-diagram.
# Team overrides:     {project-root}/_bmad/custom/hbc-create-business-flow-diagram.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-create-business-flow-diagram.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Template for the D-06 Business Flow Diagram output document.
# Default points to the shared HBLab D-* template set; override to use a
# project-specific template with different structure.
business_flow_template = "{skill-root}/assets/D-06_business-flow-diagram_template.md"

# Template for the session decision log (.decision-log.md).
# Override to change the log's structure, frontmatter fields, or section layout.
decision_log_template = "{skill-root}/assets/decision-log-template.md"

# Hint for the starting Mermaid diagram type surfaced at Stage 1. The workflow
# may override per-flow when a different type fits better — this is a default,
# not a contract. Allowed values: sequenceDiagram, flowchart, stateDiagram.
diagram_type = "sequenceDiagram"

# Single output FILE for the D-06 document (per-feature). D-06 is a per-feature
# deliverable: it lives in the feature's own planning-artifacts dir, NOT the flat
# project-level {planning_artifacts}. The session decision log (.decision-log.md)
# and scan artifacts (.scan/) are peers in that SAME per-feature dir (i.e. the
# directory of business_flow_output_path), not under the flat planning_artifacts.
business_flow_output_path = "{output_folder}/features/{feature}/planning-artifacts/D-06-{feature}-business-flow-diagram.md"

# Regex pattern for functional requirement identifiers used by check-fr-coverage.py.
# Namespace-aware (v2): matches per-feature `REQ-<FEAT>-NNN` (e.g. REQ-AUTH-001) and
# shared `REQ-SHARED-NNN` as well as legacy `REQ-001` / dotted `REQ-1.2`. A
# namespace-blind `REQ-[0-9]+` silently skipped every REQ-<FEAT>-NNN id.
# Override for projects using UC-01, US-001, etc.
fr_id_pattern = '\b(REQ-(?:[A-Z0-9]+(?:-[A-Z0-9]+)*-)?[0-9]+(?:\.[0-9]+)*)\b'

# Advisory flow-coverage check (B8-2 all-paths / B8-5 phantom + REQ-facet / B8-6
# path-ID standard). Override to use a custom checker with the same CLI interface.
flow_coverage_script = "{skill-root}/scripts/check-flow-coverage.py"

# Path-identifier scheme enforced by check-flow-coverage.py (B8-6). Default PATH-NN
# (two+ digits). Override for a project that numbers branches differently (e.g. P\d+).
path_id_pattern = 'PATH-\d{2,}'

# Scalar: executed when the workflow completes after final validation.
# Common hooks: "invoke bmad-create-architecture", "invoke bmad-create-ux-design".
on_complete = ""

# hbc-traceability impact integration (REQ-005, BR-13). When true, after a successful `update`
# auto-invoke hbc-traceability impact to cascade downstream. Default false (no behavior change).
# Skills invoked WITH --invoked-by-sync must suppress this. See hbc-traceability/references/impact-capability.md
auto_sync_after_update = false
