# HBC Applicability Catalog (canonical) — Trục B foundation (B0)
#
# Single source of truth for WHICH deliverables the HBC lifecycle defines, and
# their per-feature applicability. A per-feature *instance* (resolved required/
# optional/N-A set) is written under the feature's planning-artifacts at feature
# start; this file is the canonical schema + defaults the instance derives from.
#
# Consumed by: hbc-project-init (selection), the create-skills (each owns one
# entry), and (later, trục A backlog) hbc-phase-gate (enforce required-set).
#
# NOTE: enforcement-by-machine (reconcile_seam / ground_truth / v_pair) is
# declared here as DATA now; the build-graph kernel that enforces it is trục A
# (backlog, spike-gated). Declaring it now keeps the schema future-proof.

schema_version: "1.0"

# --- Entry schema (each deliverable entry carries these fields) ---
entry_schema:
  id:                    "Deliverable id, e.g. D-09"
  name:                  "Human name"
  scope:                 "shared | per-feature | dual"
  phase:                 "0 | 1 | 2 | 3 | 4"
  owner_skill:           "Skill that produces it"
  default_applicability: "required | optional | n-a   (before facet/maturity resolution)"
  applicability_rule:    "Facet expression that resolves applicability per feature (see facets)"
  reconcile_seam:        "(trục A, declared) which reconcile this node participates in"
  ground_truth:          "(trục A, declared) the ground-truth node it reconciles against, or null"
  v_pair:                "(V-Model) the test level paired with this deliverable, or null"

# --- Facets: boolean properties of a feature. Drive applicability-rule defaults
#     AND the Behavioral-Design trigger. One source, two uses. ---
facets:
  - has-state-machine        # lifecycle / status transitions beyond CRUD
  - has-cross-entity-sync    # ordering/timing between entities
  - has-invariant            # immutability / integrity rule (e.g. hash, snapshot)
  - has-algorithm            # non-trivial computation
  - has-concurrency          # in-flight / race conditions
  - has-integration          # touches external/other modules
  - has-ui                   # user-facing screens/components
  - has-migration            # data migration

# A feature is "non-CRUD complex" when ANY of these hold (-> Behavioral-Design):
behavioral_design_trigger:
  any_of: [has-state-machine, has-cross-entity-sync, has-invariant, has-algorithm, has-concurrency]

# --- Applicability values ---
applicability_values: [required, optional, n-a]
# Resolution: applicability_rule + facets resolve to one of the three per feature;
# maturity is a separate MODIFIER (exploratory may downgrade some required->optional;
# it NEVER touches the correctness floor). Minimal feature (no facets) -> minimal
# node-set: D-02 + D-06 only required.

# --- Canonical deliverables ---
deliverables:
  # Phase 0 (shared)
  - { id: constitution, name: "Constitution (cross-phase invariants)", scope: shared, phase: 0, owner_skill: hbc-project-init, default_applicability: required, applicability_rule: "always", reconcile_seam: null, ground_truth: null, v_pair: null }
  - { id: D-03, name: "Glossary",            scope: shared,      phase: 0, owner_skill: hbc-create-glossary,            default_applicability: required, applicability_rule: "always", reconcile_seam: null,                   ground_truth: null,            v_pair: null }
  - { id: D-12, name: "Coding Standards",    scope: shared,      phase: 0, owner_skill: hbc-create-coding-standards,    default_applicability: required, applicability_rule: "always", reconcile_seam: "code-style",           ground_truth: "code",          v_pair: null }
  - { id: integration-map, name: "Integration Map (inventory)", scope: shared, phase: 0, owner_skill: hbc-project-init, default_applicability: required, applicability_rule: "required if has-integration else optional", reconcile_seam: null, ground_truth: "code", v_pair: null }

  # Phase 1 (per-feature). D-01 feature overview is FOLDED into D-02 header.
  - { id: D-02, name: "Requirements",        scope: per-feature, phase: 1, owner_skill: hbc-create-requirements,         default_applicability: required, applicability_rule: "always", reconcile_seam: null,                   ground_truth: null,            v_pair: "acceptance" }
  - { id: D-06, name: "Business Flow",       scope: per-feature, phase: 1, owner_skill: hbc-create-business-flow-diagram, default_applicability: required, applicability_rule: "always", reconcile_seam: null,                  ground_truth: "code-behavior", v_pair: "acceptance" }

  # Phase 2 (per-feature design)
  - { id: D-09, name: "Architecture Design", scope: per-feature, phase: 2, owner_skill: hbc-create-architecture,         default_applicability: optional, applicability_rule: "required if has-integration or has-algorithm else optional", reconcile_seam: "architecture-vs-code", ground_truth: "code",   v_pair: "integration-test" }
  - { id: D-19, name: "ER / Data Design",    scope: dual,        phase: 2, owner_skill: hbc-create-er-diagram,           default_applicability: optional, applicability_rule: "required if data-model-change else n-a", reconcile_seam: "design-vs-db", ground_truth: "code-db", v_pair: "integration-test" }
  - { id: D-16, name: "Behavioral Design",   scope: per-feature, phase: 2, owner_skill: hbc-create-behavioral-design,    default_applicability: optional, applicability_rule: "required if behavioral_design_trigger else n-a", reconcile_seam: "behavioral-vs-code", ground_truth: "code", v_pair: "unit-test" }
  - { id: D-14, name: "UX / Screen Design",  scope: per-feature, phase: 2, owner_skill: hbc-create-ux,                   default_applicability: optional, applicability_rule: "required if has-ui else n-a", reconcile_seam: "ui-vs-mockup", ground_truth: "code-ui", v_pair: "e2e-test" }
  - { id: D-21, name: "API Spec",            scope: dual,        phase: 2, owner_skill: hbc-create-api-spec,             default_applicability: optional, applicability_rule: "required if exposes-api else n-a", reconcile_seam: "api-vs-code", ground_truth: "code", v_pair: "integration-test" }
  - { id: D-26, name: "Test Plan",           scope: per-feature, phase: 2, owner_skill: hbc-create-test-plan,            default_applicability: required, applicability_rule: "always", reconcile_seam: null,                   ground_truth: null,            v_pair: null }
  - { id: D-27, name: "Test Spec",           scope: per-feature, phase: 2, owner_skill: hbc-create-test-spec,            default_applicability: required, applicability_rule: "always", reconcile_seam: "test-vs-code-behavior", ground_truth: "code-behavior", v_pair: "unit-test" }

# --- Maturity modifier ---
maturity:
  exploratory: "Loosen required-node-set (downgrade non-core required->optional) + reduce ASK-volume. Correctness floor (reconcile-red->FAIL) is INVARIANT."
  stable:      "Full required-node-set + full ASK-volume."
