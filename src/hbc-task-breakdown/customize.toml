# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-task-breakdown.
# Team overrides:     {project-root}/_bmad/custom/hbc-task-breakdown.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-task-breakdown.user.toml

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Task breakdown per-feature ({feature} resolved at runtime).
output_dir = "{output_folder}/features/{feature}/implementation-artifacts"

# Validation script (structure: task-id/dependency/entity/TC + churn).
validation_script = "scripts/validate-task-breakdown.py"

# Coverage advisory (B4-7 every REQ->task / B4-2 input-set declared).
# Override to use a custom checker with the same CLI interface.
coverage_script = "scripts/check-task-coverage.py"

# Maximum hours per task (guidance for decomposition).
max_hours_per_task = 4

# hbc-traceability impact integration (REQ-005, BR-13). When true, after a successful `update`
# auto-invoke hbc-traceability impact to cascade downstream. Default false (no behavior change).
# Skills invoked WITH --invoked-by-sync must suppress this. See hbc-traceability/references/impact-capability.md
auto_sync_after_update = false
