# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-test-execution.
# Team overrides:     {project-root}/_bmad/custom/hbc-test-execution.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-test-execution.user.toml

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Execution report per-feature ({feature} resolved at runtime).
output_dir = "{output_folder}/features/{feature}/implementation-artifacts"

# Validation script.
validation_script = "scripts/validate-test-execution.py"

# Test command (auto-detected from project-context.md if empty).
# Examples: "pytest --tb=short -v", "npm test", "npx jest --verbose"
test_command = ""

# E2E test command (separate from unit/integration).
# Examples: "npx playwright test", "pytest tests/e2e/"
e2e_command = ""

# Coverage command.
# Examples: "pytest --cov=src --cov-report=term-missing", "npx jest --coverage"
coverage_command = ""

# Minimum coverage threshold for PASS status.
coverage_threshold = 80
