# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-traceability.
# Team overrides:     {project-root}/_bmad/custom/hbc-traceability.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-traceability.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Path to the living traceability matrix — PER-FEATURE ({feature} resolved at runtime).
# To override: set this key in {project-root}/_bmad/custom/hbc-traceability.toml
matrix_path = "{output_folder}/features/{feature}/traceability/matrix.md"

# Cross-feature coverage roll-up report (TRR reads every per-feature matrix → aggregates).
rollup_path = "{output_folder}/traceability/coverage-rollup.md"

# Template used when initializing a new matrix.
# Override to add custom columns (e.g. priority, module) or change header format.
matrix_template = "assets/matrix-template.md"

# Optional: source code root for Phase 3 code_ref mapping.
# Leave empty to prompt user at runtime.
source_code_path = ""

# NOTE: hbc-traceability is a terminal cascade TARGET (BR-09), not a trigger
# source — it intentionally has NO auto_sync_after_update flag.

# === Impact capability (cascade sync) ===

# Task breakdown file (PER-FEATURE) — freeze-check reads task `status` (TODO/IN_PROGRESS/DONE).
task_breakdown_path = "{output_folder}/features/{feature}/implementation-artifacts/task-breakdown.md"

# Phase-gate reports (PER-FEATURE) — freeze-check reads PASSED/FAILED per phase.
gate_reports_glob = "{output_folder}/features/{feature}/gates/phase-*-gate.md"

# Git baseline for change detection (override at runtime with --since <ref>).
impact_git_baseline = "HEAD"

# Verify (horizontal spread) flood guard: group/warn when a shared artifact is
# referenced by more REQs than this threshold.
impact_flood_threshold = 20

# RECONCILE: max number of re-suggest rounds before blocking + notifying a human.
impact_reconcile_max_retries = 2

# ref-type → owning-skill map (Stage 3 SUGGEST). Override merges by `id`:
# matching id replaced, new id appended. `match` = LLM hint for choosing when
# a design_ref could be either an entity (ER) or an endpoint (API).
[[workflow.ref_skill_map]]
id = "design_ref_entity"
match = "entity/table/module → ER"
skill = "hbc-create-er-diagram"

[[workflow.ref_skill_map]]
id = "design_ref_api"
match = "endpoint/route → API"
skill = "hbc-create-api-spec"

[[workflow.ref_skill_map]]
id = "test_ref"
match = "TC-xxx / test case"
skill = "hbc-create-test-spec"

[[workflow.ref_skill_map]]
id = "code_ref"
match = "file:function"
skill = "hbc-implement"
