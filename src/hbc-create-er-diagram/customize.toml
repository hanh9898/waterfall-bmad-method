# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for hbc-create-er-diagram.
# Team overrides:     {project-root}/_bmad/custom/hbc-create-er-diagram.toml
# Personal overrides: {project-root}/_bmad/custom/hbc-create-er-diagram.user.toml

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append
#   arrays-of-tables with `code`/`id`: replace matching items, append new ones.

activation_steps_prepend = []

activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Template for the D-19 ER Diagram output document.
# Default points to the shared HBLab D-* template set; override to use a
# project-specific template with different structure.
er_diagram_template = "assets/D-19_database-design_template.md"

# Decision log template initialized at Stage 1a.
# Override for teams requiring custom log structure or language.
decision_log_template = "assets/decision-log-template.md"

# Single output FILE for the D-19 document, written directly into
# {planning_artifacts} alongside the other D-* documents (no per-document
# folder). The session decision log (.decision-log.md) and scan artifacts
# (.scan/) are shared peers in {planning_artifacts}, not nested under D-19.
# D-19 DUAL scope: baseline SHARED (Phase 0) + override per-feature (path-existence precedence).
# By default write the shared baseline; pass feature=<slug> to create/read a per-feature override.
er_diagram_output_path = "{output_folder}/shared/erd/D-19-database-design.md"
er_diagram_feature_path = "{output_folder}/features/{feature}/planning-artifacts/D-19-{feature}-database-design.md"

# Advisory ER-consistency check (B2-2 entity↔REQ + uncovered-REQ / B2-3 ondelete
# cue / B2-7 schema-drift log-every-divergence / B2-9 churn). Override to use a
# custom checker with the same CLI interface (d19 + --sources + --code-dir).
er_consistency_script = "{skill-root}/scripts/check-er-consistency.py"

# Controls distillate production at Stage 5.
# "offer" (default): interactive asks, headless skips.
# "always": produce distillate in both modes.
# "never": skip entirely.
on_complete_distillate = "offer"

# Scalar: executed when the workflow completes after final validation.
# Common hooks: "invoke bmad-create-epics-and-stories".
on_complete = ""

# hbc-traceability impact integration (REQ-005, BR-13). When true, after a successful `update`
# auto-invoke hbc-traceability impact to cascade downstream. Default false (no behavior change).
# Skills invoked WITH --invoked-by-sync must suppress this. See hbc-traceability/references/impact-capability.md
auto_sync_after_update = false
